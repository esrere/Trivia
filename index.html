<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
</head>
<body>

<h1>Esteres trivia</h1>

<div id="scores">
    <div class="team">
        <div>Team 1: <span id="team1">0</span></div>
        <button onclick="changePoints(0, 100)">+</button>
        <button onclick="changePoints(0, -100)">-</button>
    </div>

    <div class="team">
        <div>Team 2: <span id="team2">0</span></div>
        <button onclick="changePoints(1, 100)">+</button>
        <button onclick="changePoints(1, -100)">-</button>
    </div>

    <div class="team">
        <div>Team 3: <span id="team3">0</span></div>
        <button onclick="changePoints(2, 100)">+</button>
        <button onclick="changePoints(2, -100)">-</button>
    </div>

    <div class="team">
        <div>Team 4: <span id="team4">0</span></div>
        <button onclick="changePoints(3, 100)">+</button>
        <button onclick="changePoints(3, -100)">-</button>
    </div>
</div>

<div id="board" class="board"></div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="question"></h2>

        <img id="questionImage" style="max-width:100%; margin:15px 0; display:none;">

        <video id="questionVideo" controls style="max-width:100%; max-height:400px; margin:15px 0; display:none;">
            <source id="videoSource" src="" type="video/mp4">
        </video>

        <p id="answer" style="display:none;"></p>

        <button onclick="showAnswer()">Show Answer</button>

        <hr>

        <h3>Kurš atbildēja pareizi?</h3>

        <button onclick="awardPoints(0)">Team 1</button>
        <button onclick="awardPoints(1)">Team 2</button>
        <button onclick="awardPoints(2)">Team 3</button>
        <button onclick="awardPoints(3)">Team 4</button>

        <br><br>

        <button onclick="noWinner()">Neviens</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
